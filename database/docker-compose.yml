version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: litp-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./schemas/clickhouse-init.sql:/docker-entrypoint-initdb.d/001-init.sql
    environment:
      CLICKHOUSE_DB: litp
      CLICKHOUSE_USER: litp
      CLICKHOUSE_PASSWORD: litp_dev_2024
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: litp-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:latest
    container_name: litp-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./schemas/neo4j-init.cypher:/var/lib/neo4j/import/init.cypher
    environment:
      NEO4J_AUTH: neo4j/litp_dev_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: litp-api
    ports:
      - "8080:8080"
    environment:
      - CLICKHOUSE_DSN=clickhouse://litp:litp_dev_2024@clickhouse:9000/litp
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=litp_dev_2024
      - AWS_REGION=us-east-1
      - PORT=8080
    depends_on:
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  clickhouse_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
